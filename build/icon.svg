<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fondo con gradiente y bordes redondeados -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Fondo principal con bordes redondeados (80px radius para efecto suave) -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#grad)" filter="url(#shadow)"/>

  <!-- Portafolio/Carpeta -->
  <g transform="translate(256, 256)">
    <!-- Carpeta principal -->
    <path d="M-140 -60 L-140 80 Q-140 100 -120 100 L120 100 Q140 100 140 80 L140 -20 Q140 -40 120 -40 L60 -40 L40 -80 Q35 -90 20 -90 L-120 -90 Q-140 -90 -140 -70 Z" fill="#ffffff" opacity="0.95"/>

    <!-- Solapa de la carpeta -->
    <path d="M-140 -70 L-140 -90 Q-140 -110 -120 -110 L20 -110 Q35 -110 40 -100 L60 -60 L120 -60 Q140 -60 140 -40 L140 -20 L-140 -20 Z" fill="#dcfce7" opacity="0.9"/>

    <!-- Documento dentro -->
    <rect x="-80" y="-30" width="100" height="80" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>

    <!-- Líneas del documento -->
    <line x1="-70" y1="-15" x2="10" y2="-15" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <line x1="-70" y1="0" x2="10" y2="0" stroke="#86efac" stroke-width="3" stroke-linecap="round"/>
    <line x1="-70" y1="15" x2="0" y2="15" stroke="#86efac" stroke-width="3" stroke-linecap="round"/>

    <!-- Gráfica de crecimiento -->
    <path d="M-20 40 L20 40 L20 0 L60 -30 L60 40" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="-30" r="8" fill="#ffffff"/>

    <!-- Flecha hacia arriba -->
    <path d="M40 -50 L60 -70 L80 -50" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="60" y1="-70" x2="60" y2="-30" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>