<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-square.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Busi | Tu negocio inteligente</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="toast-portal"></div>
    <div id="modal-portal"></div>
    <script>
      // Forzar la limpieza de Service Workers antiguos que bloquean la actualización
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            console.log('Limpiando Service Workers para forzar actualización...');
            for(let registration of registrations) {
              registration.unregister();
            }
            // Después de limpiar, recargar saltando la caché
            setTimeout(() => {
              window.location.reload(true);
            }, 500);
          }
        });
      }
      
      // Cache-busting para el script principal
      window.addEventListener('load', () => {
        console.log('Busi Mobile | App Ready');
      });
    </script>
    <script type="module" src="/src/main.tsx?v=mobile_update_v1"></script>
  </body>
</html>
